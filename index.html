<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Workspace | Professional Dashboard</title>
    <style>
        :root {
            --bg: #050b18;
            --surface: rgba(16, 22, 37, 0.7);
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #050b18);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        #clock {
            font-family: monospace;
            font-size: 2.2rem;
            color: var(--accent);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Buscador */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            outline: none;
        }

        input:focus, textarea:focus { border-color: var(--accent); }

        .btn {
            background: var(--accent);
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* Links */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .link-item {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid var(--border);
        }

        .link-item:hover { background: var(--accent); color: #000; }

        /* Notas */
        textarea { height: 180px; resize: none; font-family: inherit; }

        /* Checklist */
        .task { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.9rem; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div>
        <p style="font-size: 0.8rem; color: var(--text-dim);">TERMINAL_READY</p>
        <h1 style="font-size: 1.4rem;">CENTRAL_WORKSPACE</h1>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main class="grid">
    <div class="card">
        <h2>Quick Search</h2>
        <div class="search-box">
            <input type="text" id="g-search" placeholder="Google Search...">
            <button class="btn" onclick="search('g')">Go</button>
        </div>
        <div class="search-box">
            <input type="text" id="y-search" placeholder="YouTube Search...">
            <button class="btn" onclick="search('y')" style="background:#ef4444; color:white;">YT</button>
        </div>
    </div>

    <div class="card">
        <h2>Todo List</h2>
        <div class="task"><input type="checkbox"> <span>Finalizar UI Panadería</span></div>
        <div class="task"><input type="checkbox"> <span>Módulo Cesar Electrónica</span></div>
        <div class="task"><input type="checkbox"> <span>Estudiar para la UNGS</span></div>
        <div class="task"><input type="checkbox"> <span>Backup de Hardware</span></div>
    </div>

    <div class="card">
        <h2>Resources</h2>
        <div class="links-grid">
            <a href="https://github.com" target="_blank" class="link-item">GitHub</a>
            <a href="https://bolt.new" target="_blank" class="link-item">Bolt.new</a>
            <a href="https://lovable.dev" target="_blank" class="link-item">Lovable</a>
            <a href="https://web.whatsapp.com" target="_blank" class="link-item">WhatsApp</a>
        </div>
    </div>

    <div class="card" style="grid-column: span 1;">
        <h2>Dev Notes (Auto-save)</h2>
        <textarea id="dev-notes" placeholder="// Tus notas se guardan automáticamente en este navegador..."></textarea>
    </div>
</main>

<script>
    // Reloj
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    // Buscador
    function search(mode) {
        const gInput = document.getElementById('g-search');
        const yInput = document.getElementById('y-search');
        
        if (mode === 'g' && gInput.value) {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(gInput.value)}`, '_blank');
            gInput.value = "";
        } else if (mode === 'y' && yInput.value) {
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(yInput.value)}`, '_blank');
            yInput.value = "";
        }
    }

    // Enter listeners
    document.getElementById('g-search').addEventListener('keypress', e => e.key === 'Enter' && search('g'));
    document.getElementById('y-search').addEventListener('keypress', e => e.key === 'Enter' && search('y'));

    // Notas con LocalStorage (Persistencia)
    const notes = document.getElementById('dev-notes');
    notes.value = localStorage.getItem('my_workspace_notes') || "";
    notes.addEventListener('input', () => {
        localStorage.setItem('my_workspace_notes', notes.value);
    });
</script>

</body>
</html>
